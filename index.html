<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expecting · Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1d4664;--navy2:#143552;--lavender:#9474cc;--teal:#73C0CA;--amber:#FEC006;
  --bg:#f7f9fc;--white:#fff;--line:#d6dee8;--line-soft:#e8edf3;--bg-soft:#f0f4f9;
  --text:#1d4664;--text-soft:#4a6883;--text-light:#8aa1b8;
  --shadow:0 8px 24px rgba(29,70,100,.08);--shadow-lg:0 24px 60px rgba(29,70,100,.14);
  --r:10px;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Montserrat',system-ui,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* HEADER */
.site-header{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.brand-mark span{display:block;height:3px;border-radius:2px;background:var(--navy);position:relative}
.brand-mark span:nth-child(1){width:18px}.brand-mark span:nth-child(1)::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--amber)}
.brand-mark span:nth-child(2){width:18px}.brand-mark span:nth-child(2)::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--lavender)}
.brand-mark span:nth-child(3){width:10px}.brand-mark span:nth-child(3)::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--teal)}
.brand-name{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:-.02em;white-space:nowrap}
.brand-name em{font-style:italic;color:var(--lavender);font-weight:500}
.brand-sep{width:1px;height:16px;background:var(--line);flex-shrink:0;margin:0 2px}
.brand-sub{font-size:11px;font-weight:700;color:var(--text-light);white-space:nowrap}
.header-date{font-size:10px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:20px 16px 80px}

/* PAGE TITLE */
.eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--amber);margin-bottom:5px}
.page-title{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.02em;margin-bottom:3px}
.page-title em{font-style:italic;color:var(--lavender);font-weight:500}
.page-sub{font-size:11.5px;color:var(--text-soft);font-weight:500;margin-bottom:18px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--white);border:1px solid var(--line-soft);border-radius:var(--r);padding:11px 13px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat.s-navy::before{background:var(--navy)}.stat.s-amber::before{background:var(--amber)}.stat.s-lavender::before{background:var(--lavender)}.stat.s-teal::before{background:var(--teal)}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-light);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-.02em}

/* TOOLBAR */
.toolbar{margin-bottom:14px}
.toolbar-row1{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.search-wrap{position:relative;flex:1}
.search-wrap input{width:100%;padding-left:28px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:12px;pointer-events:none}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:6px}

input,select,textarea{height:36px;padding:0 10px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:12px;color:var(--text);background:var(--white);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(29,70,100,.08)}

.btn{height:36px;padding:0 14px;border-radius:8px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;letter-spacing:.02em;white-space:nowrap;flex-shrink:0}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;box-shadow:0 4px 12px rgba(29,70,100,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,70,100,.35)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--text-soft)}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{height:30px;padding:0 10px;font-size:11px;border-radius:6px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;font-size:13px}

/* DESKTOP TABLE */
.table-card{display:none;background:var(--white);border:1px solid var(--line-soft);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--text-light);background:var(--bg-soft);padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
.tbl tbody td{padding:10px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:#fafbfd}
.row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.tbl tbody tr:hover .row-actions{opacity:1}

/* MOBILE CARDS */
.task-cards{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--white);border:1px solid var(--line-soft);border-radius:var(--r);padding:14px;box-shadow:0 2px 6px rgba(29,70,100,.04)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.tc-name{font-weight:700;color:var(--navy);font-size:13px;line-height:1.4;flex:1}
.tc-desc{font-size:11px;color:var(--text-light);margin-top:3px;line-height:1.4}
.tc-actions{display:flex;gap:4px;flex-shrink:0}
.tc-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.tc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line-soft)}
.tc-assignee{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-soft)}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.p-todo{background:rgba(138,161,184,.15);color:#4a6883}
.p-progress{background:rgba(115,192,202,.2);color:#2c8993}
.p-done{background:rgba(100,180,100,.18);color:#2a7a2a}
.p-high{background:rgba(220,80,80,.14);color:#a83030}
.p-medium{background:rgba(254,192,6,.18);color:#8a6000}
.p-low{background:rgba(115,192,202,.18);color:#2c7a88}
.dept-pill{display:inline-flex;align-items:center;padding:3px 7px;border-radius:4px;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.d-marketing{background:rgba(148,116,204,.15);color:#6b4ea8}
.d-sales{background:rgba(254,192,6,.18);color:#8a6000}
.d-product{background:rgba(29,70,100,.12);color:#1d4664}
.d-general{background:rgba(138,161,184,.15);color:#4a6883}
.status-select{border:none!important;background:transparent!important;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;padding:3px 4px!important;height:auto!important;box-shadow:none!important;border-radius:20px;width:auto}

/* AVATAR */
.avatar{width:24px;height:24px;border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.assignee-cell{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600}

.task-name-cell{font-weight:600;color:var(--navy);line-height:1.4}
.task-desc-cell{font-size:10.5px;color:var(--text-light);margin-top:2px}
.due-over{color:#c44;font-weight:700;font-size:11px}
.due-soon{color:#a87800;font-weight:700;font-size:11px}
.due-ok{color:var(--text-soft);font-size:11px}

/* EMPTY */
.empty-state{text-align:center;padding:48px 24px;background:var(--white);border-radius:14px;border:1px solid var(--line-soft)}
.empty-icon{font-size:36px;display:block;margin-bottom:10px}
.empty-state h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.empty-state p{color:var(--text-soft);font-size:12px}

/* MODAL - slides up from bottom on mobile */
.overlay{position:fixed;inset:0;background:rgba(29,70,100,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:18px 18px 0 0;width:100%;max-width:540px;overflow:hidden;animation:slideUp .22s ease;max-height:93vh;display:flex;flex-direction:column}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-top{height:4px;background:linear-gradient(90deg,var(--navy),var(--lavender),var(--teal),var(--amber));flex-shrink:0}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.modal-header{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--line-soft)}
.modal-header h3{font-size:15px;font-weight:700;color:var(--navy)}
.modal-scroll{overflow-y:auto;flex:1}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;border-top:1px solid var(--line-soft);background:var(--white)}
.field{margin-bottom:12px}
.field label{display:block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--text-light);margin-bottom:4px}
.field textarea{height:60px;resize:none;padding:8px 10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* CONFIRM */
.confirm-box{background:var(--white);border-radius:14px 14px 0 0;width:100%;max-width:400px;padding:24px 20px 32px;text-align:center}
.confirm-box h4{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.confirm-box p{color:var(--text-soft);font-size:12px;margin-bottom:18px}
.confirm-actions{display:flex;gap:8px;justify-content:center}

/* DESKTOP */
@media(min-width:680px){
  .container{padding:32px 40px 64px}
  .site-header{padding:14px 40px}
  .stats{grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat-val{font-size:28px}
  .filters{grid-template-columns:repeat(4,1fr)}
  .table-card{display:block}
  .task-cards{display:none}
  .brand-sep,.brand-sub{display:flex}
  .overlay{align-items:center}
  .modal{border-radius:16px;max-height:85vh}
  .confirm-box{border-radius:14px}
  @keyframes slideUp{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
}
</style>
</head>

    <div class="brand-sep"></div>
    <div class="brand-sub">Task Manager</div>
  </div>
  <div class="header-date" id="header-date"></div>
</header>

<div class="container">
  <div class="eyebrow">Internal · Team workspace</div>
  <div class="page-title">Task <em>Manager</em></div>
  <div class="page-sub">Nadav · Dana · Danielle · Or</div>

  <div class="stats">
    <div class="stat s-navy"><div class="stat-label">Total</div><div class="stat-val" id="st-total">0</div></div>
    <div class="stat s-amber"><div class="stat-label">To Do</div><div class="stat-val" id="st-todo">0</div></div>
    <div class="stat s-lavender"><div class="stat-label">In Progress</div><div class="stat-val" id="st-prog">0</div></div>
    <div class="stat s-teal"><div class="stat-label">Done</div><div class="stat-val" id="st-done">0</div></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-row1">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Search tasks…">
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ New</button>
    </div>
    <div class="filters">
      <select id="f-status"><option value="">All statuses</option><option>To Do</option><option>In Progress</option><option>Done</option></select>
      <select id="f-priority"><option value="">All priorities</option><option>High</option><option>Medium</option><option>Low</option></select>
      <select id="f-dept"><option value="">All departments</option><option>Marketing</option><option>Sales</option><option>Product</option><option>General</option></select>
      <select id="f-assignee"><option value="">All members</option><option>Nadav</option><option>Dana</option><option>Danielle</option><option>Or</option></select>
    </div>
  </div>

  <!-- Desktop table -->
  <div class="table-card">
    <table class="tbl">
      <thead><tr>
        <th style="width:33%">Task</th><th>Dept</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Due</th><th style="width:72px"></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div class="task-cards" id="cards"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-top"></div>
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 id="modal-title">New task</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll">
      <div class="modal-body">
        <div class="field"><label>Task name *</label><input type="text" id="f-name" placeholder="What needs to be done?"></div>
        <div class="field"><label>Description</label><textarea id="f-desc" placeholder="Optional details…"></textarea></div>
        <div class="row2">
          <div class="field"><label>Department</label><select id="f-dept2"><option>Marketing</option><option>Sales</option><option>Product</option><option>General</option></select></div>
          <div class="field"><label>Assignee</label><select id="f-assign2"><option>Nadav</option><option>Dana</option><option>Danielle</option><option>Or</option><option>Unassigned</option></select></div>
        </div>
        <div class="row2">
          <div class="field"><label>Priority</label><select id="f-pri2"><option>High</option><option selected>Medium</option><option>Low</option></select></div>
          <div class="field"><label>Status</label><select id="f-stat2"><option selected>To Do</option><option>In Progress</option><option>Done</option></select></div>
        </div>
        <div class="field"><label>Due date</label><input type="date" id="f-due"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save task</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="overlay" id="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <h4>Delete task?</h4>
    <p>This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-primary" style="background:#c44;box-shadow:none" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='expecting.tasks.v4';
const AV={Nadav:'#1d4664',Dana:'#9474cc',Danielle:'#73C0CA',Or:'#FEC006',Unassigned:'#8aa1b8'};
let tasks=[],editId=null,deleteId=null;

const SAMPLE=[
  {id:'s1',name:'Set up Q2 marketing calendar',desc:'Plan all campaign dates and channels',dept:'Marketing',assignee:'Dana',priority:'High',status:'In Progress',due:'2026-05-20',created:Date.now()},
  {id:'s2',name:'Update agency onboarding deck',desc:'',dept:'Product',assignee:'Danielle',priority:'Medium',status:'To Do',due:'2026-05-25',created:Date.now()},
  {id:'s3',name:'Outreach to 10 new surrogacy agencies',desc:'Focus on East Coast agencies first',dept:'Sales',assignee:'Or',priority:'High',status:'To Do',due:'2026-05-15',created:Date.now()},
  {id:'s4',name:'Review Aimee AI chat scripts',desc:'',dept:'Product',assignee:'Nadav',priority:'Low',status:'Done',due:'2026-05-01',created:Date.now()},
  {id:'s5',name:'Monthly newsletter draft',desc:'',dept:'Marketing',assignee:'Dana',priority:'Medium',status:'To Do',due:'2026-05-30',created:Date.now()},
  {id:'s6',name:'Q2 sales pipeline review',desc:'Review all open deals and update CRM',dept:'Sales',assignee:'Or',priority:'High',status:'To Do',due:'2026-05-12',created:Date.now()},
];

function load(){try{const s=localStorage.getItem(STORAGE_KEY);tasks=s?JSON.parse(s):[];}catch(e){tasks=[];}if(!tasks.length){tasks=SAMPLE;save();}render();}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function ini(n){return(!n||n==='Unassigned')?'?':n.slice(0,2).toUpperCase();}
function sc(s){return s==='To Do'?'p-todo':s==='In Progress'?'p-progress':'p-done';}
function pc(p){return p==='High'?'p-high':p==='Medium'?'p-medium':'p-low';}
function dc(d){return 'd-'+d.toLowerCase();}

function due(v,full){
  if(!v)return'<span style="color:var(--text-light)">—</span>';
  const d=new Date(v+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/864e5);
  const fmt=d.toLocaleDateString('en-US',full?{month:'short',day:'numeric',year:'numeric'}:{month:'short',day:'numeric'});
  if(diff<0)return`<span class="due-over">⚠ ${fmt}</span>`;
  if(diff===0)return`<span class="due-soon">Today</span>`;
  if(diff<=3)return`<span class="due-soon">${fmt}</span>`;
  return`<span class="due-ok">${fmt}</span>`;
}

function filtered(){
  const q=document.getElementById('search').value.toLowerCase();
  const fs=document.getElementById('f-status').value,fp=document.getElementById('f-priority').value;
  const fd=document.getElementById('f-dept').value,fa=document.getElementById('f-assignee').value;
  return tasks.filter(t=>(!q||t.name.toLowerCase().includes(q)||(t.desc||'').toLowerCase().includes(q))&&(!fs||t.status===fs)&&(!fp||t.priority===fp)&&(!fd||t.dept===fd)&&(!fa||t.assignee===fa));
}

function render(){
  const list=filtered();
  document.getElementById('st-total').textContent=tasks.length;
  document.getElementById('st-todo').textContent=tasks.filter(t=>t.status==='To Do').length;
  document.getElementById('st-prog').textContent=tasks.filter(t=>t.status==='In Progress').length;
  document.getElementById('st-done').textContent=tasks.filter(t=>t.status==='Done').length;

  const empty=`<div class="empty-state"><span class="empty-icon">📋</span><h3>No tasks found</h3><p>Adjust filters or add a new task.</p></div>`;

  // Desktop table
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=!list.length?`<tr><td colspan="7">${empty}</td></tr>`:list.map(t=>`
    <tr>
      <td><div class="task-name-cell">${esc(t.name)}</div>${t.desc?`<div class="task-desc-cell">${esc(t.desc)}</div>`:''}</td>
      <td><span class="dept-pill ${dc(t.dept)}">${t.dept}</span></td>
      <td><div class="assignee-cell"><div class="avatar" style="background:${AV[t.assignee]||'#8aa1b8'}">${ini(t.assignee)}</div>${esc(t.assignee)}</div></td>
      <td><span class="pill ${pc(t.priority)}">${t.priority}</span></td>
      <td><select class="pill status-select ${sc(t.status)}" onchange="qs('${t.id}',this.value)">
        <option${t.status==='To Do'?' selected':''}>To Do</option>
        <option${t.status==='In Progress'?' selected':''}>In Progress</option>
        <option${t.status==='Done'?' selected':''}>Done</option>
      </select></td>
      <td>${due(t.due,false)}</td>
      <td><div class="row-actions">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('${t.id}')">✎</button>
        <button class="btn btn-ghost btn-sm btn-icon" style="color:#c44;border-color:#f0a0a0" onclick="askDel('${t.id}')">✕</button>
      </div></td>
    </tr>`).join('');

  // Mobile cards
  const cards=document.getElementById('cards');
  cards.innerHTML=!list.length?empty:list.map(t=>`
    <div class="task-card">
      <div class="tc-top">
        <div style="flex:1"><div class="tc-name">${esc(t.name)}</div>${t.desc?`<div class="tc-desc">${esc(t.desc)}</div>`:''}</div>
        <div class="tc-actions">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('${t.id}')">✎</button>
          <button class="btn btn-ghost btn-sm btn-icon" style="color:#c44;border-color:#f0a0a0" onclick="askDel('${t.id}')">✕</button>
        </div>
      </div>
      <div class="tc-meta">
        <span class="dept-pill ${dc(t.dept)}">${t.dept}</span>
        <span class="pill ${pc(t.priority)}">${t.priority}</span>
        <select class="pill status-select ${sc(t.status)}" onchange="qs('${t.id}',this.value)">
          <option${t.status==='To Do'?' selected':''}>To Do</option>
          <option${t.status==='In Progress'?' selected':''}>In Progress</option>
          <option${t.status==='Done'?' selected':''}>Done</option>
        </select>
      </div>
      <div class="tc-footer">
        <div class="tc-assignee"><div class="avatar" style="background:${AV[t.assignee]||'#8aa1b8'}">${ini(t.assignee)}</div>${esc(t.assignee)}</div>
        ${due(t.due,true)}
      </div>
    </div>`).join('');
}

function qs(id,val){const t=tasks.find(t=>t.id===id);if(t){t.status=val;save();render();}}
function askDel(id){deleteId=id;document.getElementById('confirm-overlay').style.display='flex';}
function closeConfirm(){deleteId=null;document.getElementById('confirm-overlay').style.display='none';}
function confirmDelete(){tasks=tasks.filter(t=>t.id!==deleteId);save();closeConfirm();render();}

function openModal(id){
  editId=id||null;const t=id?tasks.find(t=>t.id===id):null;
  document.getElementById('modal-title').textContent=t?'Edit task':'New task';
  document.getElementById('f-name').value=t?.name||'';
  document.getElementById('f-desc').value=t?.desc||'';
  document.getElementById('f-dept2').value=t?.dept||'Marketing';
  document.getElementById('f-assign2').value=t?.assignee||'Unassigned';
  document.getElementById('f-pri2').value=t?.priority||'Medium';
  document.getElementById('f-stat2').value=t?.status||'To Do';
  document.getElementById('f-due').value=t?.due||'';
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('f-name').focus(),60);
}
function closeModal(){document.getElementById('overlay').style.display='none';editId=null;}
function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  const task={id:editId||uid(),name,desc:document.getElementById('f-desc').value.trim(),dept:document.getElementById('f-dept2').value,assignee:document.getElementById('f-assign2').value,priority:document.getElementById('f-pri2').value,status:document.getElementById('f-stat2').value,due:document.getElementById('f-due').value,created:editId?(tasks.find(t=>t.id===editId)?.created||Date.now()):Date.now()};
  if(editId){const i=tasks.findIndex(t=>t.id===editId);tasks[i]=task;}else tasks.unshift(task);
  save();closeModal();render();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeConfirm();}if((e.metaKey||e.ctrlKey)&&e.key==='Enter')saveTask();});
['search','f-status','f-priority','f-dept','f-assignee'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});
document.getElementById('header-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
load();
</script>
</body>
